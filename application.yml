spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartexpense?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: verySecretKeyChangeThisToEnvVar
    accessTokenExpirationMs: 900000    # 15 minutes
    refreshTokenExpirationMs: 604800000 # 7 days

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO
